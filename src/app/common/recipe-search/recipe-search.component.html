<mat-expansion-panel>
  <mat-expansion-panel-header>
    <mat-panel-title>
      Filter Recipes
    </mat-panel-title>
  </mat-expansion-panel-header>

  <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form">
    <div class="filter-section">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Recipe Name</mat-label>
        <input matInput formControlName="nameContains" placeholder="Search by name">
      </mat-form-field>
    </div>

    <!-- Meal Times Filter -->
    <div class="filter-section">
      <h3>Meal Time</h3>
      <mat-chip-listbox multiple formControlName="mealTimes" aria-label="Meal time filter">
        <mat-chip-option *ngFor="let mt of mealTimeOptions" [value]="mt.value">
          {{ mt.label }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>

    <!-- Tags Filter (collapsed by default for space) -->
    <mat-expansion-panel class="tags-filter-panel">
      <mat-expansion-panel-header>
        <mat-panel-title>Filter by Tags</mat-panel-title>
        <mat-panel-description *ngIf="searchForm.value.tags?.length">
          {{ searchForm.value.tags?.length }} selected
        </mat-panel-description>
      </mat-expansion-panel-header>

      <mat-chip-listbox multiple formControlName="tags" aria-label="Tag filter">
        <mat-chip-option *ngFor="let tag of tagOptions" [value]="tag.value">
          {{ tag.label }}
        </mat-chip-option>
      </mat-chip-listbox>
    </mat-expansion-panel>

    <h3>Calories per Serving</h3>
    <div class="filter-row">
      <mat-form-field appearance="outline">
        <mat-label>Min</mat-label>
        <input matInput type="number" formControlName="minCaloriesPerServing">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Max</mat-label>
        <input matInput type="number" formControlName="maxCaloriesPerServing">
      </mat-form-field>
    </div>

    <h3>Protein per Serving (g)</h3>
    <div class="filter-row">
      <mat-form-field appearance="outline">
        <mat-label>Min</mat-label>
        <input matInput type="number" formControlName="minProteinPerServing">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Max</mat-label>
        <input matInput type="number" formControlName="maxProteinPerServing">
      </mat-form-field>
    </div>

    <h3>Carbs per Serving (g)</h3>
    <div class="filter-row">
      <mat-form-field appearance="outline">
        <mat-label>Min</mat-label>
        <input matInput type="number" formControlName="minCarbsPerServing">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Max</mat-label>
        <input matInput type="number" formControlName="maxCarbsPerServing">
      </mat-form-field>
    </div>

    <div class="action-buttons">
      <button mat-raised-button color="primary" type="submit">Search</button>
      <button mat-stroked-button type="button" (click)="onClear()">Clear</button>
    </div>
  </form>
</mat-expansion-panel>
