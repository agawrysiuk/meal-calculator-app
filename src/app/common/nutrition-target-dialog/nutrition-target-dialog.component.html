<h2 mat-dialog-title>Nutrition targets</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="target-form">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Body weight</mat-label>
        <input matInput type="number" formControlName="bodyWeightKg" min="1">
        <span matTextSuffix>kg</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Daily calories</mat-label>
        <input matInput type="number" formControlName="dailyCalories" min="1">
        <span matTextSuffix>kcal</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Protein per kg</mat-label>
        <input matInput type="number" formControlName="proteinPerKg" min="0" step="0.1">
        <span matTextSuffix>g/kg</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Carbs split</mat-label>
        <input matInput type="number" formControlName="carbsPercentOfRemaining" min="0">
        <span matTextSuffix>%</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Fat split</mat-label>
        <input matInput type="number" formControlName="fatPercentOfRemaining" min="0">
        <span matTextSuffix>%</span>
      </mat-form-field>
    </div>

    <div class="preview-panel">
      <span>{{ preview.calories }} kcal</span>
      <span>{{ preview.proteinGrams }}g protein</span>
      <span>{{ preview.carbohydratesGrams }}g carbs</span>
      <span>{{ preview.fatGrams }}g fat</span>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="save()">Save</button>
</mat-dialog-actions>
